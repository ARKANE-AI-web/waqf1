
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{display:flex;height:100vh;min-height:600px;direction:rtl;background:var(--color-background-tertiary)}
.sidebar{width:200px;background:var(--color-background-primary);border-left:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:14px;border-bottom:0.5px solid var(--color-border-tertiary)}
.logo-mark{width:32px;height:32px;border-radius:8px;background:#00C9A0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:500;font-size:15px}
.logo-text{font-size:16px;font-weight:500;margin-top:4px}
.logo-sub{font-size:11px;color:var(--color-text-tertiary)}
nav{flex:1;padding:8px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border-radius:var(--border-radius-md);border:none;background:transparent;color:var(--color-text-secondary);font-size:12px;font-weight:400;cursor:pointer;text-align:right;font-family:var(--font-sans);margin-bottom:2px;transition:background .15s}
.nav-btn:hover{background:var(--color-background-secondary)}
.nav-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.nav-dot{width:6px;height:6px;border-radius:50%;margin-right:auto;flex-shrink:0}
.nav-icon{font-size:14px;width:16px;text-align:center}
.user-area{padding:10px;border-top:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--color-text-info);flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:20px}
.screen{display:none;animation:fadeIn .2s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-header{margin-bottom:16px}
.page-tag{font-size:10px;color:var(--color-text-tertiary);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.page-title{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.page-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.metric-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.metric-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.section-label{font-size:10px;color:var(--color-text-tertiary);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;font-weight:500}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-green{background:var(--color-background-success);color:var(--color-text-success)}
.badge-red{background:var(--color-background-danger);color:var(--color-text-danger)}
.badge-yellow{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge-blue{background:var(--color-background-info);color:var(--color-text-info)}
.badge-gray{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.skill-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.skill-row:last-child{border-bottom:none}
.bar-track{height:4px;background:var(--color-background-secondary);border-radius:2px;flex:1;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.chart-wrap{position:relative;width:100%}
.tab-row{display:flex;gap:2px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:3px;margin-bottom:14px;width:fit-content}
.tab{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--color-text-secondary);font-family:var(--font-sans);transition:all .15s}
.tab.active{background:var(--color-background-primary);color:var(--color-text-primary);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn-primary{padding:9px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.btn-primary:hover{background:var(--color-background-secondary)}
.btn-accent{padding:9px 16px;border-radius:var(--border-radius-md);border:none;background:#00C9A0;color:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font-sans)}
.input-field{width:100%;padding:8px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;outline:none;font-family:var(--font-sans)}
.msg-success{padding:10px 14px;border-radius:var(--border-radius-md);background:var(--color-background-success);color:var(--color-text-success);font-size:12px;margin-bottom:12px}
.msg-error{padding:10px 14px;border-radius:var(--border-radius-md);background:var(--color-background-danger);color:var(--color-text-danger);font-size:12px;margin-bottom:12px}
.cred-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.cred-card:hover{border-color:var(--color-border-primary)}
.cred-card.expanded{border-color:var(--color-border-info)}
.row-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.row-item:last-child{border-bottom:none}
.spinner{width:14px;height:14px;border:2px solid var(--color-border-tertiary);border-top-color:#00C9A0;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.terminal{background:#0A0E14;border-radius:var(--border-radius-lg);padding:14px;font-family:var(--font-mono);font-size:11px;line-height:1.8;min-height:200px;overflow-y:auto;max-height:280px}
.terminal-log{color:#64748B}
.terminal-ok{color:#10B981}
.terminal-info{color:#3B82F6}
.terminal-done{color:#00C9A0}
.job-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);margin-bottom:6px;transition:all .3s}
.job-item.running{border-color:#F59E0B;background:var(--color-background-warning)}
.job-item.success{border-color:#10B981;background:var(--color-background-success)}
.job-dot{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.interview-q{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:12px;border-right:3px solid #00C9A0;border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0}
.waveform{display:flex;gap:3px;align-items:center;justify-content:center;height:40px}
.wave-bar{width:4px;border-radius:2px;background:#EF4444;animation:wave 0.6s ease-in-out infinite alternate}
@keyframes wave{from{height:20%}to{height:85%}}
.score-ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0}
</style>

<script>
const SCREENS=[
  {id:'dashboard',icon:'🏠',label:'لوحة التحكم B2C',color:'#00C9A0'},
  {id:'twin',icon:'🧬',label:'التوأم المهني',color:'#22D3EE'},
  {id:'ats',icon:'⚡',label:'محسّن ATS',color:'#3B82F6'},
  {id:'b2b',icon:'🏢',label:'بوابة المؤسسات',color:'#818CF8'},
  {id:'trust',icon:'◆',label:'Trust Layer',color:'#8247E5'},
  {id:'final',icon:'🚀',label:'التكامل النهائي',color:'#F59E0B'},
];

let currentScreen='dashboard';
let charts={};

function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

// Build nav
const nav=document.getElementById('nav');
SCREENS.forEach(s=>{
  const btn=document.createElement('button');
  btn.className='nav-btn'+(s.id===currentScreen?' active':'');
  btn.id='nav-'+s.id;
  btn.innerHTML=`<span class="nav-icon">${s.icon}</span><span>${s.label}</span>${s.id===currentScreen?`<span class="nav-dot" style="background:${s.color}"></span>`:''}`;
  btn.onclick=()=>switchScreen(s.id);
  nav.appendChild(btn);
});

function switchScreen(id){
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.remove('active');
    b.innerHTML=b.innerHTML.replace(/<span class="nav-dot"[^>]*><\/span>/,'');
  });
  const s=SCREENS.find(x=>x.id===id);
  document.getElementById('nav-'+id).classList.add('active');
  document.getElementById('nav-'+id).innerHTML+=`<span class="nav-dot" style="background:${s.color}"></span>`;
  const scr=document.getElementById('scr-'+id);
  scr.classList.add('active');
  currentScreen=id;
  if(id==='dashboard') initDashboardCharts();
  if(id==='twin') initTwinChart();
  if(id==='b2b') initB2BCharts();
}

// ── DASHBOARD ─────────────────────────────────────────────────
function dashboardHTML(){return`

    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">
      ${[['تقني','72%','#00C9A0'],['ذكاء ا.','28%','#EF4444'],['سحابي','35%','#EF4444'],['ناعمة','78%','#00C9A0'],['DevOps','40%','#F59E0B'],['بيانات','55%','#F59E0B']].map(([l,v,c])=>`<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${c}15;color:${c};border:0.5px solid ${c}40">${l} ${v}</span>`).join('')}

      <div style="margin-top:8px">
        ${[['المهارات التقنية',72,'#00C9A0'],['التوافق مع السوق',67,'#F59E0B'],['الشهادات',40,'#3B82F6']].map(([l,v,c])=>`<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:3px"><span>${l}</span><span style="color:${c}">${v}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${c}"></div></div></div>`).join('')}

    <div class="card">

</div>

function twinHTML(){return`
<div class="page-header">
  <div class="page-tag">Digital Career Twin</div>
  <div class="page-title">مسارك المهني خلال <span style="color:#22D3EE">5 سنوات</span></div>
  <div class="page-sub">اختر سرعة تعلمك وشاهد كيف يتغير راتبك</div>
</div>
<div class="grid-3" style="margin-bottom:14px">
  <div class="card">
    <div class="section-label">راتبك الحالي</div>
    <input type="range" id="salarySlider" min="4000" max="30000" step="500" value="8000" style="width:100%">
    <div style="display:flex;justify-content:space-between;margin-top:6px">
      <span style="font-size:10px;color:var(--color-text-tertiary)">4K</span>
      <span style="font-size:16px;font-weight:500;color:#00C9A0" id="salaryDisplay">8,000 ر</span>
      <span style="font-size:10px;color:var(--color-text-tertiary)">30K</span>
    </div>
  </div>
  <div class="card">
    <div class="section-label">مسار التعلم</div>
    <div id="pathBtns" style="display:flex;gap:6px;margin-bottom:8px">
      ${[['conservative','متحفظ','#3B82F6'],['balanced','متوازن','#00C9A0'],['aggressive','مكثف','#F59E0B']].map(([k,l,c])=>`<button onclick="selectPath('${k}')" id="pbtn-${k}" style="flex:1;padding:7px 0;border-radius:6px;font-size:11px;cursor:pointer;border:0.5px solid ${k==='balanced'?c:'var(--color-border-tertiary)'};background:${k==='balanced'?c+'15':'transparent'};color:${k==='balanced'?c:'var(--color-text-secondary)'};font-family:var(--font-sans);transition:all .15s">${l}</button>`).join('')}

  </div>
  <div class="card">
    <div class="grid-2" style="gap:8px;margin-bottom:0">
      <div><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px">راتب 5 سنوات</div><div id="finalSal" style="font-size:18px;font-weight:500;color:#00C9A0">19.2k ر</div></div>

      <div><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px">المنصب</div><div id="finalTitle" style="font-size:12px;font-weight:500">رئيس هندسة</div></div>
      <div><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px">ساعات/أسبوع</div><div id="hoursPerWeek" style="font-size:18px;font-weight:500;color:#22D3EE">10h</div></div>

  <div class="section-label">محطات المسار المتوازن</div>

let selectedPath='balanced';
let currentSalary=8000;

const PATH_DATA={
  conservative:{desc:'5h/أسبوع · نمو مستدام',hours:5,color:'#3B82F6',mult:[1,1.10,1.22,1.38,1.55,1.75],titles:['مطور','مطور','مطور أول','مهندس','مهندس AI','مهندس أول']},
  balanced:{desc:'10h/أسبوع · الخيار الأمثل',hours:10,color:'#00C9A0',mult:[1,1.20,1.45,1.72,2.05,2.40],titles:['مطور','مطور متقدم','مهندس AI','قائد تقني','مدير هندسة','رئيس هندسة']},
  aggressive:{desc:'20h/أسبوع · نمو سريع',hours:20,color:'#F59E0B',mult:[1,1.40,1.85,2.30,2.90,3.60],titles:['مطور','مهندس AI','قائد AI','مدير تقني','VP هندسة','CTO']},
};

function selectPath(p){
  selectedPath=p;
  Object.keys(PATH_DATA).forEach(k=>{
    const btn=document.getElementById('pbtn-'+k);
    if(!btn)return;
    const c=PATH_DATA[k].color;
    btn.style.border=k===p?`0.5px solid ${c}`:'0.5px solid var(--color-border-tertiary)';
    btn.style.background=k===p?c+'15':'transparent';
    btn.style.color=k===p?c:'var(--color-text-secondary)';
  });
  const el=document.getElementById('pathDesc');
  if(el)el.textContent=PATH_DATA[p].desc;
  updateTwinKPIs();
  initTwinChart();
}

function updateTwinKPIs(){
  const pd=PATH_DATA[selectedPath];
  const finalSal=Math.round(currentSalary*pd.mult[5]);
  const growth=Math.round((pd.mult[5]-1)*100);
  document.getElementById('finalSal').textContent=(finalSal/1000).toFixed(1)+'k ر';
  document.getElementById('growth').textContent='+'+growth+'%';
  document.getElementById('finalTitle').textContent=pd.titles[5];
  document.getElementById('hoursPerWeek').textContent=pd.hours+'h';

function initTwinChart(){

function initInterview(){
  iPhase='setup';curQ=0;iTimer=0;iScores=[];iRecording=false;iProcessing=false;
  if(iTimerInterval){clearInterval(iTimerInterval);iTimerInterval=null;}
}

function startInterview(){
  iPhase='active';
  document.getElementById('interview-setup').style.display='none';
  document.getElementById('interview-active').style.display='block';
  iTimerInterval=setInterval(()=>{iTimer++;const t=document.getElementById('i-timer');if(t)t.textContent=fmtTime(iTimer);},1000);
  updateQuestion();
}

function updateQuestion(){
  const q=IQS[curQ];
  const qt=document.getElementById('i-qtext'),qc=document.getElementById('i-qcat'),qn=document.getElementById('i-qnum'),pr=document.getElementById('i-progress');
  if(qt)qt.textContent=q.text;
  if(qc)qc.textContent='سؤال '+q.cat;
  if(qn)qn.textContent=`سؤال ${curQ+1}/${IQS.length}`;
  if(pr)pr.style.width=(curQ/IQS.length*100)+'%';
  const tr=document.getElementById('i-transcript');if(tr)tr.textContent='اضغط "بدء التسجيل" للإجابة...';
  const fb=document.getElementById('i-feedback');if(fb)fb.style.display='none';
  const sd=document.getElementById('i-score-display');if(sd)sd.innerHTML='<div style="padding:20px 0;color:var(--color-text-tertiary);font-size:12px">في انتظار إجابتك</div>';
  const btn=document.getElementById('i-rec-btn');if(btn){btn.textContent='🎙️ بدء التسجيل';btn.style.background='#00C9A0';btn.disabled=false;}
}

async function toggleRecording(){
  if(iProcessing)return;
  if(!iRecording){
    iRecording=true;
    const btn=document.getElementById('i-rec-btn');if(btn){btn.textContent='⏹ إنهاء الإجابة';btn.style.background='#EF4444';}
    const wf=document.getElementById('i-waveform');if(wf)wf.style.display='block';
    const tr=document.getElementById('i-transcript');if(tr)tr.textContent='جارٍ الاستماع...';
  } else {
    iRecording=false;iProcessing=true;
    const wf=document.getElementById('i-waveform');if(wf)wf.style.display='none';
    const btn=document.getElementById('i-rec-btn');if(btn){btn.textContent='جارٍ التقييم...';btn.disabled=true;}
    const tr=document.getElementById('i-transcript');if(tr)tr.textContent='يُفرَّغ عبر Gemini Flash...';
    await new Promise(r=>setTimeout(r,2000));
    if(tr)tr.textContent=TRANSCRIPTS[curQ]||TRANSCRIPTS[0];
    await new Promise(r=>setTimeout(r,1200));
    const score=70+Math.floor(Math.random()*25);
    iScores.push(score);
    const col=score>=85?'#00C9A0':score>=70?'#3B82F6':'#F59E0B';
    const sd=document.getElementById('i-score-display');
    if(sd)sd.innerHTML=`<svg width="60" height="60" style="transform:rotate(-90deg);display:block;margin:0 auto 8px"><circle cx="30" cy="30" r="24" fill="none" stroke="var(--color-border-tertiary)" stroke-width="4"/><circle cx="30" cy="30" r="24" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${score/100*150.8} 150.8" stroke-linecap="round"/></svg><div style="font-size:28px;font-weight:500;color:${col}">${score}</div><div style="font-size:13px;font-weight:500;color:${col}">${score>=85?'ممتاز':score>=70?'جيد جداً':'جيد'}</div>`;
    const fb=document.getElementById('i-feedback');if(fb)fb.style.display='block';
    const ft=document.getElementById('i-feedback-text');if(ft)ft.textContent='إجابة تُظهر فهماً جيداً للمفهوم. أضف مثالاً من تجربتك الشخصية لتقوية الإجابة.';
    const tips=document.getElementById('i-tips');
    if(tips)tips.innerHTML=['أضف أرقاماً وتأثيراً قابلاً للقياس','استخدم STAR method','اذكر الـ trade-offs بين الخيارات'].map(t=>`<div style="font-size:11px;color:var(--color-text-secondary);padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary)">← ${t}</div>`).join('');
    const ctrls=document.getElementById('i-controls');
    if(ctrls)ctrls.innerHTML=`<button class="btn-primary" onclick="skipQuestion()" style="flex:1">تخطي</button><button class="btn-accent" onclick="nextQuestion()" style="flex:2;padding:12px">${curQ<IQS.length-1?'التالي →':'إنهاء المقابلة'}</button>`;
    iProcessing=false;
  }
}

async function skipQuestion(){nextQuestion(true);}
async function nextQuestion(skip=false){
  curQ++;
  if(curQ>=IQS.length){endInterview();return;}
  const ctrls=document.getElementById('i-controls');
  if(ctrls)ctrls.innerHTML=`<button id="i-rec-btn" class="btn-accent" onclick="toggleRecording()" style="flex:2;padding:12px">🎙️ بدء التسجيل</button><button class="btn-primary" onclick="skipQuestion()" style="flex:1">تخطي</button>`;
  updateQuestion();
}

function endInterview(){
  iPhase='complete';
  if(iTimerInterval){clearInterval(iTimerInterval);iTimerInterval=null;}
  document.getElementById('interview-active').style.display='none';
  document.getElementById('interview-complete').style.display='block';
  const avg=iScores.length?Math.round(iScores.reduce((a,b)=>a+b,0)/iScores.length):0;
  const grade=avg>=85?'A':avg>=70?'B':'C';
  const col=avg>=85?'#00C9A0':avg>=70?'#3B82F6':'#F59E0B';
  document.getElementById('i-final-score').textContent=`${avg}/100 · درجة ${grade}`;
  document.getElementById('i-final-score').style.color=col;
  document.getElementById('i-final-stats').innerHTML=[
    [avg,'الدرجة الإجمالية',col],[IQS.length,'أسئلة أُجيب',C.blue],[fmtTime(iTimer),'مدة المقابلة','#F59E0B']
  ].map(([v,l,c])=>`<div class="metric"><div class="metric-val" style="color:${c}">${v}</div><div class="metric-lbl">${l}</div></div>`).join('');
}

function resetInterview(){
  iPhase='setup';curQ=0;iTimer=0;iScores=[];
  document.getElementById('interview-complete').style.display='none';
  document.getElementById('interview-setup').style.display='block';
}

async function runCI(){
  if(ciRunning)return;
  ciRunning=true;
  const btn=document.getElementById('ci-btn');if(btn){btn.disabled=true;btn.textContent='جارٍ التشغيل...';}
  const terminal=document.getElementById('ci-terminal');
  if(terminal)terminal.innerHTML='';
  CI_JOBS.forEach(j=>{const el=document.getElementById('job-'+j.id);const d=document.getElementById('dot-'+j.id);if(el){el.className='job-item';el.style.borderColor='';el.style.background='';}if(d){d.textContent='○';d.style.color='var(--color-text-tertiary)';}});
  for(let i=0;i<CI_JOBS.length;i++){
    const job=CI_JOBS[i];
    const el=document.getElementById('job-'+job.id);const d=document.getElementById('dot-'+job.id);
    if(el){el.className='job-item running';}
    if(d){d.textContent='⟳';d.style.color='#F59E0B';}
    const logIdx=i*2;
    if(terminal&&CI_LOGS[logIdx]){const div=document.createElement('div');div.className='terminal-log';div.textContent=CI_LOGS[logIdx];terminal.appendChild(div);terminal.scrollTop=terminal.scrollHeight;}
    await new Promise(r=>setTimeout(r,450));
    if(terminal&&CI_LOGS[logIdx+1]){const div=document.createElement('div');div.className='terminal-ok';div.textContent=CI_LOGS[logIdx+1];terminal.appendChild(div);terminal.scrollTop=terminal.scrollHeight;}
    await new Promise(r=>setTimeout(r,350));
    if(el){el.className='job-item success';}
    if(d){d.textContent='✓';d.style.color='#10B981';}
  }
  for(let i=CI_JOBS.length*2;i<CI_LOGS.length;i++){
    await new Promise(r=>setTimeout(r,280));
    if(terminal){const div=document.createElement('div');div.className=CI_LOGS[i].startsWith('🎉')?'terminal-done':CI_LOGS[i].startsWith('✓')?'terminal-ok':'terminal-log';div.textContent=CI_LOGS[i];terminal.appendChild(div);terminal.scrollTop=terminal.scrollHeight;}
  }
  ciRunning=false;
  if(btn){btn.disabled=false;btn.textContent='▶ تشغيل Pipeline';}
}
